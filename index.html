<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待機画面</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #fffbbb;
      --gold: #f8bc17;
      --gold-light: #83754a;
      --gold-dark: #8a6e2a;
      --dim: #1e1a10;
      --strip-h: 180px;
    }

   html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Noto Serif JP', serif;
      overflow: hidden;
    }

    /* ── 全体レイアウト ── */
    .stage {
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto 60px auto 1fr;
      align-items: center;
    }
    
    /* ── ノイズグレイン ── */
    .grain {
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 10;
      opacity: .5;
    }

  .line-top, .line-bottom {
      position: fixed; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold-dark) 15%, var(--gold-light) 50%, var(--gold-dark) 85%, transparent);
    }
    .line-top    { top: 0; }
    .line-bottom { bottom: 0; }

    /* ── ゴールドの細いサブライン ── */
    .line-top::after, .line-bottom::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dark) 15%, var(--gold) 50%, var(--gold-dark) 85%, transparent);
    }
    .line-top::after    { top: 6px; }
    .line-bottom::after { bottom: 6px; }
    /* ── 中央テキストエリア ── */
    .center-block {
      grid-row: 3;
      text-align: center;
      z-index: 5;
      padding: 0 24px;
    }

    .label {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(10px, 1.2vw, 14px);
      letter-spacing: .4em;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp .8s .2s ease forwards;
    }

    .title {
      font-family: 'BIZ UDPMincho', 'Noto Serif JP', serif;
      font-weight: 800;
      font-size: clamp(48px, 8vw, 96px);
      letter-spacing: .12em;
      line-height: 1.1;
      color: var(--fg);
      text-shadow:
        0 0 40px rgba(255, 187, 0, 0.585),
        0 2px 4px rgba(0,0,0,.8),
        1px 1px 0 #8888886e, -1px 1px 0 #888,
        1px -1px 0 #888, -1px -1px 0 #888;
      opacity: 0;
      animation: fadeUp .9s .5s ease forwards;
    }

   .subtitle {
      margin-top: 20px;
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(16px, 1.6vw, 18px);
      font-weight: 400;
      letter-spacing: .25em;
      color: var(--gold);
     text-shadow:
        0 0 40px rgba(255, 187, 0, 0.585),
        0 2px 4px rgba(0,0,0,.8),
        1px 1px 0 #8888886e, -1px 1px 0 #888,
        1px -1px 0 #888, -1px -1px 0 #888;
      animation: fadeUp .8s .8s ease forwards;
    }
    /* ── ローディングドット ── */
    .dots {
      display: inline-flex; gap: 8px;
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp .8s 1.1s ease forwards;
    }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    /* ── 画像ストリップ ── */
    .strip-wrap {
      overflow: hidden;
      width: 100%;
      height: var(--strip-h);
      mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, black 8%, black 92%, transparent);
    }

    .strip-wrap.top    { grid-row: 2; }
    .strip-wrap.bottom { grid-row: 4; }

     /* ストリップ上下のゴールドライン */
    .strip-wrap.top {
      border-top: 1px solid var(--gold-dark);
      border-bottom: 1px solid var(--gold-dark);
    }
    .strip-wrap.bottom {
      border-top: 1px solid var(--gold-dark);
      border-bottom: 1px solid var(--gold-dark);
    }

    .strip {
      display: flex; gap: 12px;
      height: 100%;
      width: max-content;
    }

    .strip-wrap.top    .strip { animation: scrollLeft  56s linear infinite; }
    .strip-wrap.bottom .strip { animation: scrollRight 56s linear infinite; }

    .card {
      flex-shrink: 0;
      width: calc(var(--strip-h) * 16 / 9);
      height: var(--strip-h);
      border-radius: 4px;
      overflow: hidden;
      background: var(--dim);
      border: 1px solid var(--gold-dark);
      position: relative;
    }

    .card img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      opacity: 0;
    }

    /* ダミー画像：グラデーションで番号表示 */
  
    .card img {
      width: 100%; height: 100%;
      object-fit: contain;
      background: #ffffff;
      display: block;
      opacity: 0;   /* 実際の画像を入れたとき表示 */l
    }

    /* ── キーフレーム ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: .25; transform: scale(.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
    @keyframes scrollLeft {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    @keyframes scrollRight {
      from { transform: translateX(-50%); }
      to   { transform: translateX(0); }
    }
  </style>
</head>
<body>

<div class="grain"></div>
<div class="line-top"></div>
<div class="line-bottom"></div>

<div class="stage">

  <!-- 上段ストリップ（右→左） -->
  <div class="strip-wrap top">
    <div class="strip" id="strip-top"></div>
  </div>

  <!-- 中央テキスト -->
  <div class="center-block">
    <p class="title">C高１・高２</p>
    <h1 class="title">探究プログラム
    </h1>
     <h1 class="title">グランプリ発表会
    </h1>
    <p class="subtitle">2026年3月10日(火) ＠コルベ講堂</p>
    <div class="dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <!-- 下段ストリップ（左→右） -->
  <div class="strip-wrap bottom">
    <div class="strip" id="strip-bottom"></div>
  </div>

</div>
<script>
  // カード生成（14枚 × 2セット でシームレスループ）
  const images = [
    'photo01.jpg',
    'photo02.png',
    'photo03.png',
    'photo04.png',
    'photo05.png',
    'photo06.png',
    'photo07.png',
    'photo08.png',
    'photo09.png',
    'photo10.jpg',
    'photo11.png',
    'photo12.png',
    'photo13.jpg',
    'photo14.png',
  ];

  function buildStrip(id, offset) {
    const strip = document.getElementById(id);
    const total = 14;
    for (let s = 0; s < 2; s++) {
      for (let i = 1; i <= total; i++) {
        const card = document.createElement('div');
        card.className = 'card';
        const img = document.createElement('img');
        img.src = images[i - 1];
        img.style.opacity = '1';
        card.appendChild(img);
        strip.appendChild(card);
      }
    }
  }

  buildStrip('strip-top', 0);
  buildStrip('strip-bottom', 0);
</script>

  buildStrip('strip-top', 0);
  buildStrip('strip-bottom', 0);
</script>
</body>
</html>
